<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Premier Bingo</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:15px;
}

.container{
background:white;
padding:20px;
border-radius:15px;
max-width:450px;
margin:auto;
}

h1{
text-align:center;
}

input,button{
width:100%;
padding:15px;
font-size:18px;
margin-top:10px;
box-sizing:border-box;
}

button{
background:#111;
color:white;
border:0;
border-radius:10px;
}

video{
width:100%;
border-radius:10px;
margin-top:15px;
}

#ultimo{
font-size:45px;
font-weight:bold;
text-align:center;
margin:20px;
}

#total{
font-size:25px;
text-align:center;
}

.caixa{
background:#eee;
padding:10px;
margin-top:5px;
border-radius:8px;
}

.erro{
color:red;
text-align:center;
}

</style>

</head>


<body>


<div class="container">


<h1>Premier Bingo</h1>


<input id="cliente" placeholder="Nome do cliente">


<button onclick="ligarCamera()">
📷 INICIAR LEITURA
</button>


<video id="video"></video>


<div class="erro" id="erro"></div>


<h3>Última caixa</h3>

<div id="ultimo">-</div>


<div id="total">
Total: 0
</div>


<div id="lista"></div>


<button onclick="finalizar()">
FINALIZAR
</button>


</div>



<script>


let caixas=[];

let scanner = null;



function ligarCamera(){


const codeReader = new ZXing.BrowserMultiFormatReader();

scanner=codeReader;


codeReader.decodeFromVideoDevice(
null,
'video',
(result,err)=>{


if(result){

let codigo=result.text;


// Aqui assumimos que o código de barras
// contém apenas o número da caixa


adicionarCaixa(codigo);


navigator.vibrate(200);

}


});


}



function adicionarCaixa(numero){


let erro=document.getElementById("erro");


if(caixas.includes(numero)){


erro.innerHTML=
"⚠ Caixa "+numero+" já registada";


return;


}


erro.innerHTML="";


caixas.push(numero);



document.getElementById("ultimo").innerHTML=
numero;


document.getElementById("total").innerHTML=
"Total: "+caixas.length;


mostrar();


}



function mostrar(){


let lista=document.getElementById("lista");


lista.innerHTML="";


caixas.forEach(c=>{


lista.innerHTML+=
"<div class='caixa'>✔ "+c+"</div>";


});


}



function finalizar(){


let cliente=document.getElementById("cliente").value;


alert(
"Cliente: "+cliente+
"\n\nCaixas:\n"+
caixas.join("\n")+
"\n\nTotal: "+
caixas.length
);


}



</script>


</body>
</html>
