<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premier Bingo OCR</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f1f1f1;
padding:15px;
}

.container{
background:white;
border-radius:15px;
padding:20px;
max-width:450px;
margin:auto;
}

h1{
text-align:center;
}

input,button{
width:100%;
padding:16px;
font-size:18px;
margin-top:10px;
border-radius:10px;
box-sizing:border-box;
}

button{
background:#111;
color:white;
border:0;
}

video{
width:100%;
margin-top:15px;
border-radius:15px;
}

canvas{
display:none;
}


.moldura{
border:3px solid red;
height:80px;
margin-top:-150px;
position:relative;
z-index:2;
}


.resultado{

font-size:45px;
font-weight:bold;
text-align:center;
margin:25px;

}


.caixa{

background:#eee;
padding:10px;
margin-top:5px;
border-radius:8px;

}


</style>


</head>


<body>


<div class="container">


<h1>Premier Bingo</h1>


<input id="cliente" placeholder="Nome do cliente">


<button onclick="abrirCamera()">
📷 Abrir Câmara
</button>


<video id="video" autoplay playsinline></video>


<div class="moldura"></div>


<button onclick="lerNumero()">
🔍 Ler número
</button>


<canvas id="canvas"></canvas>


<div class="resultado" id="resultado">
-
</div>


<button onclick="confirmar()">
✅ Confirmar número
</button>


<div id="total">
Total: 0
</div>


<div id="lista"></div>


</div>
