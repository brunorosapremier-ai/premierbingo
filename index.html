<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premier Bingo OCR</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f1f1f1;
padding:15px;
}

.container{
background:white;
border-radius:15px;
padding:20px;
max-width:450px;
margin:auto;
}

h1{
text-align:center;
}

input,button{
width:100%;
padding:16px;
font-size:18px;
margin-top:10px;
border-radius:10px;
box-sizing:border-box;
}

button{
background:#111;
color:white;
border:0;
}

video{
width:100%;
margin-top:15px;
border-radius:15px;
}

canvas{
display:none;
}


.moldura{
border:3px solid red;
height:80px;
margin-top:-150px;
position:relative;
z-index:2;
}


.resultado{

font-size:45px;
font-weight:bold;
text-align:center;
margin:25px;

}


.caixa{

background:#eee;
padding:10px;
margin-top:5px;
border-radius:8px;

}


</style>


</head>


<body>


<div class="container">


<h1>Premier Bingo</h1>


<input id="cliente" placeholder="Nome do cliente">


<button onclick="abrirCamera()">
📷 Abrir Câmara
</button>


<video id="video" autoplay playsinline></video>


<div class="moldura"></div>


<button onclick="lerNumero()">
🔍 Ler número
</button>


<canvas id="canvas"></canvas>


<div class="resultado" id="resultado">
-
</div>


<button onclick="confirmar()">
✅ Confirmar número
</button>


<div id="total">
Total: 0
</div>


<div id="lista"></div>


</div>
  <script>

let caixas = [];
let numeroAtual = "";

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");


// Abrir câmara traseira

async function abrirCamera(){

try{

let stream = await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
}
}

});


video.srcObject = stream;


}

catch(e){

alert("Não foi possível abrir a câmara");

}


}


// Ler número

async function lerNumero(){


let ctx = canvas.getContext("2d");


canvas.width = video.videoWidth;
canvas.height = video.videoHeight;


// tirar fotografia

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);


// melhorar imagem

let imagem = ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


for(let i=0;i<imagem.data.length;i+=4){


let media =
(
imagem.data[i]+
imagem.data[i+1]+
imagem.data[i+2]
)/3;


// preto e branco

let valor = media < 150 ? 0 : 255;


imagem.data[i]=valor;
imagem.data[i+1]=valor;
imagem.data[i+2]=valor;


}


ctx.putImageData(imagem,0,0);



document.getElementById("resultado").innerHTML=
"A ler...";



// OCR apenas números

let resultado = await Tesseract.recognize(

canvas,

"eng",

{

tessedit_char_whitelist:
"0123456789"

}

);



let texto =
resultado.data.text;



console.log(texto);



// procurar números

let encontrados =
texto.match(/\d+/g);



if(encontrados){


// escolhe o maior número encontrado

numeroAtual =
encontrados.sort(
(a,b)=>b.length-a.length
)[0];


document.getElementById("resultado").innerHTML =
numeroAtual;


}

else{


numeroAtual="";


document.getElementById("resultado").innerHTML =
"Não encontrei";


}


}



// confirmar número


function confirmar(){


if(numeroAtual==""){
return;
}



if(caixas.includes(numeroAtual)){


alert(
"⚠ Caixa "+numeroAtual+" já registada"
);


return;

}



caixas.push(numeroAtual);



navigator.vibrate(200);



document.getElementById("resultado").innerHTML =
"✔ "+numeroAtual;



document.getElementById("total").innerHTML =
"Total: "+caixas.length;



mostrarLista();



numeroAtual="";


}




function mostrarLista(){


let lista =
document.getElementById("lista");


lista.innerHTML="";


caixas.forEach(function(c){


lista.innerHTML +=

"<div class='caixa'>✔ Caixa "+c+"</div>";


});


}


</script>


</body>

</html>
